apiVersion: v1
kind: Pod
metadata:
  name: simple-app1
spec:
  containers:
    - name: app-simple
      image: vietaws/eks:v1
      ports:
        - containerPort: 8080
      resources:
        requests:
          memory: "1Gi"
          cpu: "1"
        limits:
          memory: "2Gi"
          # cpu: '500m'
