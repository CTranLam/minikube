apiVersion: apps/v1
kind: Deployment
metadata:
  name: appv2
  labels:
    app: app2-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: app2
  template:
    metadata:
      labels:
        app: app2
    spec:
      containers:
        - name: simple-app
          image: vietaws/eks:v3
          ports:
            - containerPort: 8080
