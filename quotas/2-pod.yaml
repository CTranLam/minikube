apiVersion: v1
kind: Pod
metadata:
  name: simple-app1
  namespace: ns1
spec:
  containers:
    - name: app-simple
      image: vietaws/eks:v1
      ports:
        - containerPort: 8080
      resources:
        requests:
          memory: "0.5Gi"
          cpu: "0.5"
        limits:
          memory: "1Gi"
          cpu: "1"
